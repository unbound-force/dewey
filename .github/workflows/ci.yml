name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR. Avoids redundant
# work when multiple pushes land in quick succession.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -v -count=1 -coverprofile=coverage.out ./...

      - name: Install gaze
        run: go install github.com/unbound-force/gaze/cmd/gaze@latest

      # Threshold gate: runs on every push and PR. No AI, no billing.
      # Uses gaze crap with threshold flags — exits non-zero on regression.
      - name: Gaze threshold gate
        run: |
          gaze crap --format=json \
            --coverprofile=coverage.out \
            --max-crapload=48 \
            --max-gaze-crapload=18 \
            ./...

      # AI-formatted report: runs only on pushes to main (not PRs, not
      # feature branches). This is the expensive step that uses OpenCode.
      # Threshold enforcement is handled by the gate above, so this step
      # is informational only (continue-on-error).
      - name: Gaze AI quality report
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          npm install -g opencode-ai@1.2.26
          gaze report ./... \
            --ai=opencode \
            --model=opencode/claude-sonnet-4-6 \
            --coverprofile=coverage.out
