version: 2

project_name: dewey

builds:
  - binary: dewey
    main: .
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

nfpms:
  - id: dewey
    package_name: dewey
    vendor: Unbound Force
    homepage: "https://github.com/unbound-force/dewey"
    maintainer: "Unbound Force <team@unboundforce.dev>"
    description: >-
      Knowledge graph MCP server with persistence, semantic
      search, and pluggable content sources
    license: Apache-2.0
    formats:
      - rpm
    bindir: /usr/bin

homebrew_casks:
  - name: dewey
    description: "Knowledge graph MCP server with persistence, semantic search, and pluggable content sources"
    homepage: "https://github.com/unbound-force/dewey"
    directory: Casks
    # skip_upload: true — GoReleaser generates the cask to dist/ but does not
    # push to the tap. The sign-macos job downloads it, patches darwin checksums
    # with signed values, then pushes the complete cask to homebrew-tap.
    skip_upload: true
    dependencies:
      - cask: ollama-app
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/dewey"]
          end
    repository:
      owner: unbound-force
      name: homebrew-tap

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
