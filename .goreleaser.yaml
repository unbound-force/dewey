version: 2

project_name: dewey

builds:
  - binary: dewey
    main: .
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

brews:
  - repository:
      owner: unbound-force
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: dewey
    homepage: https://github.com/unbound-force/dewey
    description: Knowledge graph MCP server with persistence, semantic search, and pluggable content sources
    license: MIT
    dependencies:
      - name: ollama
        type: recommended
    install: |
      bin.install "dewey"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
